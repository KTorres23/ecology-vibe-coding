<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iNat Secondary Explorer</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    .filter-panel {
      background: #fff;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-weight: bold;
      font-size: 0.85em;
      margin-bottom: 5px;
    }

    input,
    select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .actions {
      margin: 20px 0;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #status {
      font-style: italic;
      color: #555;
      margin-left: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 6px;
      overflow: hidden;
      background: white;
      transition: 0.2s;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-info {
      padding: 10px;
      font-size: 0.8em;
    }

    .confidence-score {
      color: #74ac00;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="sidebar_icon" id="sidebarToggle"><svg viewBox="0 0 24 24">
      <rect x="4" y="6" width="16" height="2" />
      <rect x="4" y="11" width="16" height="2" />
      <rect x="4" y="16" width="16" height="2" />
    </svg></div>


  <!-- Sidebar content -->
  <div class="sidebar_box" id="sidebar">
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="../pages/inat_query.html">iNaturalist Query Tool</a></li>
      <li><a href="../pages/jobs.html">TAMU Ecology Jobs</a></li>
      <li><a href="../pages/image_sorter.html">iNaturalist Annotator Tool</a></li>
      <li><a href="../pages/secondary_explorer.html">Secondary Data Explorer</a></li>
      <li><a href="#">More projects soon</a></li>
    </ul>
  </div>


  <header>
    <h1>Ecology Vibe Coding</h1>
  </header>

  <main>
    <h2>Secondary Data Explorer</h2>

    <!-- Filters Panel -->
    <div class="filter-panel">
      <div class="input-group">
        <label>Species Name</label>
        <input type="text" id="species" placeholder="e.g. Ursus americanus">
      </div>
      <div class="input-group">
        <label>Area (Place ID or slug)</label>
        <input type="text" id="place" placeholder="e.g. illinois">
      </div>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="user" placeholder="iNat username">
      </div>
      <div class="input-group">
        <label>Sample Size (<span id="sampleVal">20</span>)</label>
        <input type="range" id="limit" min="10" max="100" value="20" oninput="sampleVal.innerText=this.value">
      </div>
      <div class="input-group">
        <label>Start Date</label>
        <input type="date" id="d1">
      </div>
      <div class="input-group">
        <label>End Date</label>
        <input type="date" id="d2">
      </div>
    </div>

    <!-- Control Buttons -->
    <div class="actions">
      <button id="fetchBtn">1. Fetch Preview</button>
      <button id="analyzeBtn" class="hidden">2. Run CLIP Analysis</button>
      <div class="input-group" id="confControl" style="display:none; flex-direction:row; align-items:center; gap:10px;">
        <label>Min Confidence: <span id="confVal">0</span>%</label>
        <input type="range" id="confFilter" min="0" max="100" value="0">
      </div>
    </div>

    <div class="input-group">
      <label>Analyze for:</label>
      <input type="text" id="feature" placeholder="e.g. a bear near a road">
    </div>

    <p id="status">Ready.</p>
    <div id="results" class="grid"></div>
  </main>

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19';

    // Explicitly grab the elements to avoid naming collisions with 'window' properties
    const statusEl = document.getElementById('status');
    const resultsGrid = document.getElementById('results');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const confControl = document.getElementById('confControl');
    const sampleVal = document.getElementById('sampleVal');

    let classifier;
    let observations = [];

    // 1. Load Model - update 'status' to 'statusEl'
    (async () => {
      statusEl.innerText = "Loading AI Model (~350MB)...";
      try {
        classifier = await pipeline('zero-shot-image-classification', 'Xenova/clip-vit-base-patch32');
        statusEl.innerText = "Model ready.";
      } catch (e) {
        statusEl.innerText = "Error loading model. Check console.";
        console.error(e);
      }
    })();

    // 2. Step 1: Fetch - update 'status' to 'statusEl'
    document.getElementById('fetchBtn').onclick = async () => {
      const sp = document.getElementById('species').value;
      const user = document.getElementById('user').value;
      const place = document.getElementById('place').value;
      const limit = document.getElementById('limit').value;
      const d1 = document.getElementById('d1').value;
      const d2 = document.getElementById('d2').value;

      statusEl.innerText = "Searching iNat...";
      let url = `https://api.inaturalist.org/v1/observations?q=${sp}&per_page=${limit}&only_id=false`;
      if (user) url += `&user_id=${user}`;
      if (place) url += `&place_id=${place}`;
      if (d1) url += `&d1=${d1}`;
      if (d2) url += `&d2=${d2}`;

      const res = await fetch(url);
      const data = await res.json();
      observations = data.results;

      renderGrid();
      analyzeBtn.classList.remove('hidden');
      statusEl.innerText = `Fetched ${observations.length} observations.`;
    };

    function renderGrid() {
      const grid = document.getElementById('results');
      grid.innerHTML = observations.map(obs => `
            <div class="card" id="obs-${obs.id}" data-score="0">
              <img src="${obs.photos[0]?.url.replace('square', 'medium')}" crossorigin="anonymous">
              <div class="card-info">
                <div class="confidence-score hidden" id="score-${obs.id}"></div>
                <small>User: ${obs.user.login}</small><br>
                <small>Date: ${obs.observed_on}</small>
              </div>
            </div>
          `).join('');
    }


    // 3. Step 2: Analyze - update 'status' to 'statusEl'
    analyzeBtn.onclick = async () => {
      const feature = document.getElementById('feature').value;
      if (!feature) return alert("Enter a feature to search for!");

      analyzeBtn.disabled = true;
      confControl.style.display = 'flex';

      for (let obs of observations) {
        if (!obs.photos.length) continue;
        const img = obs.photos[0].url.replace('square', 'medium');
        const proxied = `https://wsrv.nl/?url=${encodeURIComponent(img)}`;

        statusEl.innerText = `Analyzing ${obs.id}...`;
        const output = await classifier(proxied, [feature, "a natural landscape"]);
        const score = output.find(o => o.label === feature).score;

        const scoreEl = document.getElementById(`score-${obs.id}`);
        const cardEl = document.getElementById(`obs-${obs.id}`);
        scoreEl.innerText = `Match: ${(score * 100).toFixed(1)}%`;
        scoreEl.classList.remove('hidden');
        cardEl.dataset.score = score * 100;
      }
      statusEl.innerText = "Analysis complete.";
      analyzeBtn.disabled = false;
    };

    // Confidence Filter Logic
    document.getElementById('confFilter').oninput = (e) => {
      const min = e.target.value;
      document.getElementById('confVal').innerText = min;
      document.querySelectorAll('.card').forEach(card => {
        const score = parseFloat(card.dataset.score);
        card.style.display = (score >= min || card.dataset.score === "0") ? 'block' : 'none';
      });
    };
  </script>
  <script src="../scripts/sidebar.js"></script>
</body>

</html>
