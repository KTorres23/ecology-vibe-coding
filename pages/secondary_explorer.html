<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iNat Secondary Explorer Pro</title>
  <link rel="stylesheet" href="../styles/main.css" />
  <style>
    .filter-panel {
      background: #fff;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-weight: bold;
      font-size: 0.85em;
      margin-bottom: 5px;
    }

    input,
    select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .actions {
      margin: 20px 0;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #status {
      font-style: italic;
      color: #555;
      margin-bottom: 15px;
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      border: 1px solid #eee;
      border-radius: 6px;
      overflow: hidden;
      background: white;
      transition: all 0.2s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border-color: #74ac00;
    }

    /* OVERRIDE BLUE TEXT: Inherit color from parent, remove underline */
    .card a {
      color: inherit;
      text-decoration: none;
      display: block;
    }

    .card a:hover {
      text-decoration: none;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 12px;
      font-size: 0.85em;
    }

    .confidence-score {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(116, 172, 0, 0.9);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    button {
      background-color: #74ac00;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 4px;
      font-weight: bold;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="sidebar_icon" id="sidebarToggle"><svg viewBox="0 0 24 24">
      <rect x="4" y="6" width="16" height="2" />
      <rect x="4" y="11" width="16" height="2" />
      <rect x="4" y="16" width="16" height="2" />
    </svg></div>
  <div class="sidebar_box" id="sidebar">
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="inat_query.html">iNat Query</a></li>
      <li><a href="secondary_explorer.html">Secondary Explorer</a></li>
    </ul>
  </div>

  <header>
    <h1>Ecology Vibe Coding</h1>
  </header>

  <main>
    <h2>Secondary Data Explorer (Large Model)</h2>
    <span id="status">Initializing...</span>

    <div class="filter-panel">
      <div class="input-group">
        <label>Taxon (Family, Genus, Species, etc.)</label>
        <input type="text" id="taxon" placeholder="e.g. Animalia, Monarch, Ursus americanus">
      </div>
      <div class="input-group">
        <label>Place (Text search)</label>
        <input type="text" id="place" placeholder="e.g. Illinois, Yellowstone, Amazon">
      </div>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="user" placeholder="e.g. beartracker">
      </div>
      <div class="input-group">
        <label>Sample Size (<span id="sampleVal">20</span>)</label>
        <input type="range" id="limit" min="10" max="100" value="20"
          oninput="document.getElementById('sampleVal').innerText=this.value">
      </div>
      <!-- Re-added Date Filters -->
      <div class="input-group">
        <label>Start Date</label>
        <input type="date" id="d1">
      </div>
      <div class="input-group">
        <label>End Date</label>
        <input type="date" id="d2">
      </div>
    </div>

    <div class="actions">
      <button id="fetchBtn">1. Fetch Preview</button>
      <button id="analyzeBtn" class="hidden">2. Run CLIP Analysis</button>
      <div id="confControl" class="hidden" style="display:flex; align-items:center; gap:10px;">
        <label>Min Match: <span id="confVal">0</span>%</label>
        <input type="range" id="confFilter" min="0" max="100" value="0">
      </div>
    </div>

    <div class="filter-panel" style="margin-top:0; border-top:none;">
      <div class="input-group">
        <label>Target Feature (Search For)</label>
        <input type="text" id="feature" placeholder="e.g. photo with bear tracks">
      </div>
      <div class="input-group">
        <label>Negative Baseline (Compare Against)</label>
        <input type="text" id="baseline" value="e.g. photo with no bear tracks">
      </div>
    </div>

    <div id="results" class="grid"></div>
  </main>

  <script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0-alpha.19';

    const statusEl = document.getElementById('status');
    const resultsGrid = document.getElementById('results');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const confControl = document.getElementById('confControl');

    let classifier;
    let observations = [];

    // 1. Load Large Quantized Model
    (async () => {
      statusEl.innerText = "Loading Large AI Model (~400MB)...";
      try {
        classifier = await pipeline('zero-shot-image-classification', 'Xenova/clip-vit-large-patch14', {
          dtype: 'q4',
          device: 'webgpu'
        });
        statusEl.innerText = "Large Model Ready.";
      } catch (e) {
        statusEl.innerText = "WebGPU not available. Loading on CPU...";
        classifier = await pipeline('zero-shot-image-classification', 'Xenova/clip-vit-large-patch14', { dtype: 'q4' });
        statusEl.innerText = "Large Model Ready (CPU Mode).";
      }
    })();

    // Helper Function to get Taxon ID
    async function getTaxonId(taxonName) {
      if (!taxonName) return null;
      const res = await fetch(`https://api.inaturalist.org/v1/taxa/autocomplete?q=${encodeURIComponent(taxonName)}`);
      const data = await res.json();
      return data.results.length ? data.results[0].id : null;
    }

    // Helper Function to get Place ID
    async function getPlaceId(placeName) {
      if (!placeName) return null;
      const res = await fetch(`https://api.inaturalist.org/v1/places/autocomplete?q=${encodeURIComponent(placeName)}`);
      const data = await res.json();
      return data.results.length ? data.results[0].id : null;
    }

    // 2. Fetch iNat Data
    document.getElementById('fetchBtn').onclick = async () => {
      const taxonQuery = document.getElementById('taxon').value;
      const placeQuery = document.getElementById('place').value;
      const user = document.getElementById('user').value;
      const limit = document.getElementById('limit').value;
      const d1 = document.getElementById('d1').value;
      const d2 = document.getElementById('d2').value;

      statusEl.innerText = "Resolving search parameters...";

      // Get IDs before searching
      const taxonId = await getTaxonId(taxonQuery);
      if (taxonQuery && !taxonId) {
        return statusEl.innerText = `Could not find Taxon: ${taxonQuery}`;
      }

      const placeId = await getPlaceId(placeQuery);
      if (placeQuery && !placeId) {
        return statusEl.innerText = `Could not find Place: ${placeQuery}`;
      }

      statusEl.innerText = "Fetching observations...";

      // Build URL
      let url = `https://api.inaturalist.org/v1/observations?per_page=${limit}&only_id=false&order_by=created_at&order=desc`;
      if (taxonId) url += `&taxon_id=${taxonId}`;
      if (placeId) url += `&place_id=${placeId}`;
      if (user) url += `&user_id=${user}`;
      if (d1) url += `&d1=${d1}`;
      if (d2) url += `&d2=${d2}`;

      const res = await fetch(url);
      const data = await res.json();
      observations = data.results;

      if (observations.length === 0) {
        statusEl.innerText = "No observations found for these filters.";
        resultsGrid.innerHTML = "";
        analyzeBtn.classList.add('hidden');
        return;
      }

      renderGrid();
      analyzeBtn.classList.remove('hidden');
      statusEl.innerText = `Previewing ${observations.length} images. Ready for analysis.`;
    };

    function renderGrid() {
      resultsGrid.innerHTML = observations.map(obs => {
        const rawUrl = obs.photos[0]?.url.replace('square', 'medium') || '';
        const proxiedUrl = `https://wsrv.nl/?url=${encodeURIComponent(rawUrl)}`;

        return `
              <div class="card" id="obs-${obs.id}" data-score="0">
                <a href="https://www.inaturalist.org/observations/${obs.id}" target="_blank">
                  <div class="confidence-score hidden" id="score-${obs.id}">0%</div>
                  <img src="${proxiedUrl}" crossorigin="anonymous">
                  <div class="card-info">
                    <strong>User:</strong> ${obs.user.login}<br>
                    <strong>Observed:</strong> ${obs.observed_on}
                  </div>
                </a>
              </div>
            `;
      }).join('');
    }

    // 3. Analyze with Negative Baseline
    analyzeBtn.onclick = async () => {
      const feature = document.getElementById('feature').value;
      const baseline = document.getElementById('baseline').value;
      if (!feature) return alert("Enter a feature!");

      analyzeBtn.disabled = true;
      confControl.classList.remove('hidden');

      for (let obs of observations) {
        if (!obs.photos.length) continue;
        const img = obs.photos[0].url.replace('square', 'medium');
        const proxied = `https://wsrv.nl/?url=${encodeURIComponent(img)}`;

        statusEl.innerText = `Deep Analyzing Obs ${obs.id}...`;

        const labels = [feature, baseline, "blurry texture", "out of focus background"];
        const output = await classifier(proxied, labels);

        const score = output.find(o => o.label === feature).score;
        const scorePercent = (score * 100).toFixed(1);

        const scoreEl = document.getElementById(`score-${obs.id}`);
        const cardEl = document.getElementById(`obs-${obs.id}`);
        scoreEl.innerText = `${scorePercent}%`;
        scoreEl.classList.remove('hidden');
        cardEl.dataset.score = scorePercent;
      }
      statusEl.innerText = "Deep Analysis Complete.";
      analyzeBtn.disabled = false;
    };

    // Filter Logic
    document.getElementById('confFilter').oninput = (e) => {
      const min = e.target.value;
      document.getElementById('confVal').innerText = min;
      document.querySelectorAll('.card').forEach(card => {
        const s = parseFloat(card.dataset.score);
        card.style.display = (s >= min || card.dataset.score === "0") ? 'block' : 'none';
      });
    };
  </script>
  <script src="../scripts/sidebar.js"></script>
</body>

</html>
